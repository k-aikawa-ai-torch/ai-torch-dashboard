<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#6B7A99;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:15px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.main{max-width:1200px;margin:0 auto;padding:16px}
.member-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.member-tab{padding:6px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #DEE7F7;color:#6B7A99;background:#fff}
.member-tab.active{background:#14213D;color:#fff;border-color:#14213D}
.section-title{font-size:13px;font-weight:500;color:#6B7A99;margin-bottom:10px;margin-top:20px;text-transform:uppercase;letter-spacing:0.05em}
.sec-header{display:flex;align-items:center;gap:8px;margin:0 0 10px 2px}
.section-block{border:1px solid #DEE7F7;border-radius:16px;padding:20px;margin-bottom:24px;background:#FAFBFE}
.sec-header .bar{width:4px;height:16px;border-radius:2px}
.sec-header .title{font-size:16px;font-weight:500;color:#14213D}
.sec-header .sub{font-size:11px;color:#9aa3b8}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:8px}
.kpi-card{background:#fff;border:1px solid #DEE7F7;border-radius:10px;padding:14px 16px}
.kpi-label{font-size:11px;color:#6B7A99;margin-bottom:6px}
.kpi-main{display:flex;align-items:baseline;gap:6px}
.kpi-value{font-size:24px;font-weight:600;color:#14213D}
.kpi-unit{font-size:12px;color:#6B7A99}
.kpi-sub{font-size:11px;color:#6B7A99;margin-top:4px}
.loading{text-align:center;padding:40px;color:#6B7A99}
.top-strip{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:18px 20px 0}
.top-strip h1{font-size:17px;font-weight:700;color:#14213D}
.badge{background:#fff;border:1px solid #DEE7F7;font-size:11px;padding:3px 10px;border-radius:20px;color:#6B7A99}
.media-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #DEE7F7;font-size:12.5px}
.media-table th{background:#f9f9f7;font-size:11px;font-weight:500;color:#6B7A99;padding:8px 10px;text-align:center;border-bottom:1px solid #DEE7F7;white-space:nowrap}
.media-table th:first-child{text-align:left}
.media-table td{padding:9px 10px;border-bottom:1px solid #f5f5f5;text-align:center}
.media-table td:first-child{text-align:left;font-weight:500;cursor:pointer;color:#0D40D9}
.media-table td:first-child:hover{text-decoration:underline}
.media-table tr:last-child td{border-bottom:none}
.edit-toggle-btn{padding:6px 14px;font-size:12px;border:1px solid #DEE7F7;border-radius:8px;background:#fff;cursor:pointer;color:#14213D}
.edit-toggle-btn.on{background:#14213D;color:#fff;border-color:#14213D}
.media-input{width:64px;height:26px;padding:0 4px;border:1px solid #DEE7F7;border-radius:4px;font-size:12px;text-align:center}
#media-modal,#custom-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center}
#media-modal.open,#custom-modal.open{display:flex}
.modal-box{background:#fff;border-radius:12px;width:90%;max-width:520px;padding:24px;max-height:85vh;overflow-y:auto}
.modal-header{font-size:15px;font-weight:500;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:#6B7A99}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.form-group label{font-size:11px;color:#6B7A99;font-weight:500}
.form-group input,.form-group select{height:36px;padding:0 10px;border:1px solid #DEE7F7;border-radius:8px;font-size:13px;background:#fff;width:100%}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0}
.btn-save{padding:0 20px;height:38px;background:#14213D;color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer}
.btn-cancel{padding:0 20px;height:38px;background:#fff;color:#14213D;border:1px solid #DEE7F7;border-radius:8px;font-size:13px;cursor:pointer}
.custom-list{background:#fff;border:1px solid #DEE7F7;border-radius:12px;padding:4px 16px}
.custom-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}

.custom-row .name{flex:1;font-size:13px}

.custom-row .del-btn{background:none;border:none;color:#c00;cursor:pointer;font-size:12px}
</style>

<script>
const SUPABASE_URL = 'https://vqunibhzmvlckqbydgea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdW5pYmh6bXZsY2txYnlkZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzY0NTYsImV4cCI6MjA5NzgxMjQ1Nn0.t9_RIVPY1vrgGmxxFFYXP9uWxT7401ha4Flc9q0_zMA';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const MEMBER_MAP = {'相川':'aikawa_kenta','永井':'nagai_yudai','會澤':'aizawa_yuma'};
const MEMBER_NAMES = {'aikawa_kenta':'相川','nagai_yudai':'永井','aizawa_yuma':'會澤'};
const SOURCE_LIST = ['スカウト（ビズリーチ）','レバテックダイレクト','スカウト（LinkedIn）','スカウト（AMBI）','スカウト（YOUTRUST）','リファラル（求職者紹介）','リファラル（社員経由）','自社HP','アライアンス'];

let MEMBERS = [], PIPELINE_DATA = [], PHASE_HISTORY = [], CANDIDATE_DATA = [], TARGETS = [];
let MANUAL_KPI = [], CUSTOM_METRICS = [];
let currentMember = '全員';
let currentMonth = '';
let editMode = false;
let CURRENT_USER_EMAIL = null;

async function doLogin() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います'; return; }
  CURRENT_USER_EMAIL = email;
  showApp();
}
async function doLogout() { await sb.auth.signOut(); location.reload(); }
function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}
sb.auth.getSession().then(({ data: { session } }) => { if (session) { CURRENT_USER_EMAIL = session.user.email; showApp(); } });

function cleanSource(s) { return (s || '').replace(/^[（(]+/, '').trim(); }

function getMonths() {
  const now = new Date();
  const arr = [];
  for (let i = -1; i <= 3; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    arr.push({ key: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'), label: (d.getMonth()+1) + '月' });
  }
  return arr;
}
function getMonthRange(ym) {
  const [y, mo] = ym.split('-').map(Number);
  return { start: ym + '-01', end: new Date(y, mo, 1).toISOString().substring(0,10) };
}

async function fetchAllRange(table, select) {
  let all = [], from = 0;
  const size = 1000;
  while (true) {
    const { data, error } = await sb.from(table).select(select).range(from, from + size - 1);
    if (error || !data || data.length === 0) break;
    all = all.concat(data);
    if (data.length < size) break;
    from += size;
  }
  return all;
}

async function loadData() {
  const months = getMonths();
  currentMonth = months[1].key;
  const now = new Date();

  const tabsEl = document.getElementById('month-tabs');
  tabsEl.innerHTML = months.map(m => '<button class="member-tab' + (m.key===currentMonth?' active':'') + '" onclick="setMonth(\'' + m.key + '\')" data-tab="1">' + m.label + '</button>').join('');

  const selectEl = document.getElementById('month-select');
  const allMonths = [];
  const startD = new Date(2025, 1, 1);
  const endD = new Date(now.getFullYear(), now.getMonth() + 3, 1);
  for (let d = new Date(startD); d <= endD; d.setMonth(d.getMonth() + 1)) {
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    allMonths.push({ key, label: d.getFullYear() + '年' + (d.getMonth()+1) + '月' });
  }
  allMonths.reverse();
  selectEl.innerHTML = '<option value="">他の月を選択…</option>' + allMonths.map(m => '<option value="' + m.key + '">' + m.label + '</option>').join('');

  const [{ data: members }, { data: candidates }, { data: targets }, pipeline, phaseHistory, { data: manualKpi }, { data: customMetrics }] = await Promise.all([
    sb.from('members').select('*'),
    sb.from('candidates').select('*,members(name,display_name)'),
    sb.from('targets').select('*,members(name,display_name)'),
    fetchAllRange('pipeline', '*, members(name,display_name), candidates(source)'),
    fetchAllRange('pipeline_phase_history', '*'),
    sb.from('manual_kpi_inputs').select('*'),
    sb.from('custom_metrics').select('*,members(name,display_name)'),
  ]);

  MEMBERS = members || [];
  CANDIDATE_DATA = candidates || [];
  TARGETS = targets || [];
  PIPELINE_DATA = pipeline || [];
  PHASE_HISTORY = phaseHistory || [];
  MANUAL_KPI = manualKpi || [];
  CUSTOM_METRICS = customMetrics || [];

  document.getElementById('header-badge').textContent = currentMonth;
  render();
}

function setMonth(m) {
  if (!m) return;
  currentMonth = m;
  document.querySelectorAll('[data-tab="1"]').forEach(t => t.classList.remove('active'));
  const btn = Array.from(document.querySelectorAll('[data-tab="1"]')).find(b => b.getAttribute('onclick').includes("'" + m + "'"));
  if (btn) btn.classList.add('active');
  document.getElementById('month-select').value = '';
  document.getElementById('header-badge').textContent = m;
  render();
}

function setMember(m, el) {
  currentMember = m;
  document.querySelectorAll('.member-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterByMemberName(arr, memberName) {
  if (memberName === '全員') return arr;
  const key = MEMBER_MAP[memberName];
  return arr.filter(x => x.members && x.members.name === key);
}

// そのpipelineが対象フェーズに「初めて」到達した日付をpipeline_idごとに求める
function firstOccurrenceMap(pipelineItems, phases) {
  const ids = new Set(pipelineItems.map(p => p.id));
  const map = {};
  PHASE_HISTORY.filter(h => ids.has(h.pipeline_id) && phases.includes(h.phase)).forEach(h => {
    if (!map[h.pipeline_id] || h.changed_at < map[h.pipeline_id]) map[h.pipeline_id] = h.changed_at;
  });
  return map;
}
// 指定フェーズに当月中に初到達したpipeline件数
function countPhaseReachedInMonth(pipelineItems, phase, month) {
  const map = firstOccurrenceMap(pipelineItems, [phase]);
  return Object.values(map).filter(d => d.substring(0,7) === month).length;
}
const ACCEPT_PHASES = ['内定承諾','入社待ち','入社済み'];
function countAcceptsForMonths(pipelineItems, monthList) {
  const map = firstOccurrenceMap(pipelineItems, ACCEPT_PHASES);
  return Object.values(map).filter(d => monthList.includes(d.substring(0,7))).length;
}
function sumActualRevenueForMonths(pipelineItems, candidateItems, monthList) {
  const map = firstOccurrenceMap(pipelineItems, ACCEPT_PHASES);
  const counted = new Set();
  let sum = 0;
  Object.keys(map).forEach(pid => {
    if (!monthList.includes(map[pid].substring(0,7))) return;
    const p = pipelineItems.find(x => x.id === pid);
    if (!p || !p.candidate_id || counted.has(p.candidate_id)) return;
    counted.add(p.candidate_id);
    const c = CANDIDATE_DATA.find(x => x.id === p.candidate_id);
    if (c && c.revenue_forecast) sum += c.revenue_forecast;
  });
  return sum;
}
function sumGrossProfitForMonths(candidateItems, monthList) {
  return candidateItems.reduce((s,c) => {
    if (c.gross_profit == null || !c.gross_profit_calculated_at) return s;
    return monthList.includes(c.gross_profit_calculated_at.substring(0,7)) ? s + c.gross_profit : s;
  }, 0);
}

function fmtSalary(v) { if (v==null) return '-'; return '¥' + Math.round(v).toLocaleString(); }
function fmtPct(v) { return v==null || !isFinite(v) ? '-' : Math.round(v*1000)/10 + '%'; }

// ============ 基礎指標レジストリ（自動集計＋手入力）============
function computeBaseMetric(key, pipelineItems, candidateItems, month) {
  switch(key) {
    case 'doc_screen': return countPhaseReachedInMonth(pipelineItems, '書類選考', month);
    case 'casual': return countPhaseReachedInMonth(pipelineItems, 'カジュアル面談', month);
    case 'first_interview': return countPhaseReachedInMonth(pipelineItems, '一次面接', month);
    case 'final_interview': return countPhaseReachedInMonth(pipelineItems, '最終面接', month);
    case 'offer': return countPhaseReachedInMonth(pipelineItems, '内定', month);
    case 'accept': return countPhaseReachedInMonth(pipelineItems, '内定承諾', month);
    case 'interviews': return candidateItems.filter(c => (c.registered_at||'').substring(0,7) === month).length;
    case 'recommends': {
      const ids = [...new Set(pipelineItems.map(p => p.member_id).filter(Boolean))];
      return ids.reduce((s,mid) => { const t = TARGETS.find(t => t.member_id===mid && t.year_month===month); return s + ((t && t.recommend_actual) || 0); }, 0);
    }
    case 'revenue': return sumActualRevenueForMonths(pipelineItems, candidateItems, [month]);
    case 'profit': return sumGrossProfitForMonths(candidateItems, [month]);
    case 'scout': return sumManual(pipelineItems, month, 'scout_count');
    case 'lead': return sumManual(pipelineItems, month, 'lead_count');
    default: return 0;
  }
}
function sumManual(pipelineItems, month, field) {
  const memberIds = new Set(pipelineItems.map(p => p.member_id).filter(Boolean));
  if (currentMember === '全員') return MANUAL_KPI.filter(m => m.year_month === month).reduce((s,m) => s + (m[field]||0), 0);
  return MANUAL_KPI.filter(m => m.year_month === month && memberIds.has(m.member_id)).reduce((s,m) => s + (m[field]||0), 0);
}

const BASE_METRIC_OPTIONS = [
  { key: 'scout', label: 'スカウト数（手入力）' },
  { key: 'lead', label: 'リード獲得数（手入力）' },
  { key: 'interviews', label: '面談数（候補者登録数）' },
  { key: 'recommends', label: '推薦数' },
  { key: 'doc_screen', label: '書類選考到達数' },
  { key: 'casual', label: 'カジュアル面談到達数' },
  { key: 'first_interview', label: '一次面接到達数' },
  { key: 'final_interview', label: '最終面接到達数' },
  { key: 'offer', label: '内定到達数' },
  { key: 'accept', label: '内定承諾到達数' },
  { key: 'revenue', label: '売上実績（円）' },
  { key: 'profit', label: '粗利実績（円）' },
];

function render() {
  const el = document.getElementById('kpi-content');
  const myPipeline = filterByMemberName(PIPELINE_DATA, currentMember);
  const myCandidates = filterByMemberName(CANDIDATE_DATA, currentMember);

  let html = '';

  // ===== デフォルト指標（自動集計） =====
  const docScreen = computeBaseMetric('doc_screen', myPipeline, myCandidates, currentMonth);
  const casual = computeBaseMetric('casual', myPipeline, myCandidates, currentMonth);
  const firstI = computeBaseMetric('first_interview', myPipeline, myCandidates, currentMonth);
  const finalI = computeBaseMetric('final_interview', myPipeline, myCandidates, currentMonth);
  const offer = computeBaseMetric('offer', myPipeline, myCandidates, currentMonth);
  const accept = computeBaseMetric('accept', myPipeline, myCandidates, currentMonth);
  const revenue = computeBaseMetric('revenue', myPipeline, myCandidates, currentMonth);

  const docPassRate = docScreen ? casual/docScreen : null;
  const firstToFinalRate = firstI ? finalI/firstI : null;
  const finalToOfferRate = finalI ? offer/finalI : null;
  const acceptRate = offer ? accept/offer : null;
  const avgUnitPrice = accept ? revenue/accept : null;

  html += '<div class="section-block">';
  html += '<div class="sec-header"><span class="bar" style="background:#0D40D9"></span><span class="title">遷移率・単価（自動計算）</span><span class="sub">' + currentMonth + '</span></div>';
  html += '<div class="kpi-grid">';
  html += kpiCard('書類通過率', fmtPct(docPassRate), docScreen + '件 → ' + casual + '件');
  html += kpiCard('一次⇒最終率', fmtPct(firstToFinalRate), firstI + '件 → ' + finalI + '件');
  html += kpiCard('最終⇒内定率', fmtPct(finalToOfferRate), finalI + '件 → ' + offer + '件');
  html += kpiCard('内定承諾率', fmtPct(acceptRate), offer + '件 → ' + accept + '件');
  html += kpiCard('平均単価', avgUnitPrice!=null ? fmtSalary(avgUnitPrice) : '-', '売上実績 ÷ 承諾数');
  html += '</div>';

  if (currentMember === '全員') {
    html += '<div class="section-title" style="margin-top:16px">内定承諾率（メンバー毎）</div>';
    html += '<div class="kpi-grid">';
    MEMBERS.forEach(m => {
      const mp = PIPELINE_DATA.filter(p => p.members && p.members.name === m.name);
      const mOffer = computeBaseMetric('offer', mp, [], currentMonth);
      const mAccept = computeBaseMetric('accept', mp, [], currentMonth);
      html += kpiCard(MEMBER_NAMES[m.name], fmtPct(mOffer ? mAccept/mOffer : null), mOffer + '件 → ' + mAccept + '件');
    });
    html += '</div>';
  }
  html += '</div>';

  // ===== 手入力：スカウト数・リード獲得数（媒体別） =====
  html += '<div class="section-block">';
  html += '<div class="sec-header"><span class="bar" style="background:#4a3aa7"></span><span class="title">媒体別スカウト・リード実績</span><span class="sub">' + currentMonth + (currentMember==='全員' ? '・全員合計' : '・' + currentMember) + '</span></div>';
  html += '<div style="text-align:right;margin-bottom:10px"><button class="edit-toggle-btn' + (editMode?' on':'') + '" onclick="toggleEditMode()">' + (editMode ? '✓ 編集モード中' : '✏️ 入力モード') + '</button></div>';
  html += renderMediaTable();
  html += '</div>';

  // ===== カスタム指標 =====
  html += '<div class="section-block">';
  html += '<div class="sec-header"><span class="bar" style="background:#eb6834"></span><span class="title">カスタム指標</span><span class="sub">全員に共有・A÷B×倍率</span></div>';
  html += '<div style="text-align:right;margin-bottom:10px"><button class="edit-toggle-btn" onclick="openCustomModal()">＋ 新しい指標を追加</button></div>';
  html += renderCustomMetrics(myPipeline, myCandidates);
  html += '</div>';

  el.innerHTML = html;
}

function kpiCard(label, value, sub) {
  return '<div class="kpi-card"><div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-main"><span class="kpi-value">' + value + '</span></div>' +
    (sub ? '<div class="kpi-sub">' + sub + '</div>' : '') + '</div>';
}

function toggleEditMode() { editMode = !editMode; render(); }

function renderMediaTable() {
  const memberIds = currentMember === '全員' ? MEMBERS.map(m => m.id) : [MEMBERS.find(m => m.name === MEMBER_MAP[currentMember])?.id];
  let html = '<table class="media-table"><thead><tr><th>媒体</th><th>スカウト数</th><th>リード獲得数</th><th>返信率</th><th>面談数</th><th>選考数</th><th>内定数</th><th>承諾数</th></tr></thead><tbody>';
  SOURCE_LIST.forEach(function(source) {
    const scoutTotal = MANUAL_KPI.filter(m => m.year_month===currentMonth && m.source===source && memberIds.includes(m.member_id)).reduce((s,m)=>s+(m.scout_count||0),0);
    const leadTotal = MANUAL_KPI.filter(m => m.year_month===currentMonth && m.source===source && memberIds.includes(m.member_id)).reduce((s,m)=>s+(m.lead_count||0),0);
    const replyRate = scoutTotal ? leadTotal/scoutTotal : null;

    const srcCandidates = CANDIDATE_DATA.filter(c => cleanSource(c.source) === source && memberIds.includes(c.member_id));
    const srcCandidateIds = new Set(srcCandidates.map(c => c.id));
    const interviews = srcCandidates.filter(c => (c.registered_at||'').substring(0,7) === currentMonth).length;
    const srcPipeline = PIPELINE_DATA.filter(p => p.candidate_id && srcCandidateIds.has(p.candidate_id));
    const selections = countPhaseReachedInMonth(srcPipeline, 'カジュアル面談', currentMonth);
    const offers = countPhaseReachedInMonth(srcPipeline, '内定', currentMonth);
    const accepts = countPhaseReachedInMonth(srcPipeline, '内定承諾', currentMonth);

    html += '<tr>';
    html += '<td onclick="openMediaModal(\'' + source + '\')">' + source + '</td>';
    if (editMode && currentMember !== '全員') {
      const memberId = memberIds[0];
      const existing = MANUAL_KPI.find(m => m.member_id===memberId && m.source===source && m.year_month===currentMonth);
      html += '<td><input class="media-input" type="number" id="scout-' + source.replace(/[^a-zA-Z0-9]/g,'') + '" value="' + (existing ? existing.scout_count||'' : '') + '" onchange="saveManualInput(\'' + memberId + '\',\'' + source + '\')"></td>';
      html += '<td><input class="media-input" type="number" id="lead-' + source.replace(/[^a-zA-Z0-9]/g,'') + '" value="' + (existing ? existing.lead_count||'' : '') + '" onchange="saveManualInput(\'' + memberId + '\',\'' + source + '\')"></td>';
    } else {
      html += '<td>' + scoutTotal + '</td><td>' + leadTotal + '</td>';
    }
    html += '<td>' + fmtPct(replyRate) + '</td><td>' + interviews + '</td><td>' + selections + '</td><td>' + offers + '</td><td>' + accepts + '</td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  return html;
}

async function saveManualInput(memberId, source) {
  const key = source.replace(/[^a-zA-Z0-9]/g,'');
  const scoutVal = document.getElementById('scout-' + key).value;
  const leadVal = document.getElementById('lead-' + key).value;
  const payload = {
    member_id: memberId, source: source, year_month: currentMonth,
    scout_count: scoutVal ? parseInt(scoutVal) : null,
    lead_count: leadVal ? parseInt(leadVal) : null,
    updated_at: new Date().toISOString(),
  };
  const { error } = await sb.from('manual_kpi_inputs').upsert(payload, { onConflict: 'member_id,source,year_month' });
  if (error) { alert('保存に失敗しました: ' + error.message); return; }
  const { data } = await sb.from('manual_kpi_inputs').select('*');
  MANUAL_KPI = data || [];
  render();
}

function openMediaModal(source) {
  document.getElementById('media-modal-title').textContent = source;
  const memberIds = currentMember === '全員' ? MEMBERS.map(m => m.id) : [MEMBERS.find(m => m.name === MEMBER_MAP[currentMember])?.id];
  const rows = getMonths().map(function(mo) {
    const scoutTotal = MANUAL_KPI.filter(m => m.year_month===mo.key && m.source===source && memberIds.includes(m.member_id)).reduce((s,m)=>s+(m.scout_count||0),0);
    const leadTotal = MANUAL_KPI.filter(m => m.year_month===mo.key && m.source===source && memberIds.includes(m.member_id)).reduce((s,m)=>s+(m.lead_count||0),0);
    const rate = scoutTotal ? leadTotal/scoutTotal : null;
    return '<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px"><span>' + mo.label + '</span><span>スカウト' + scoutTotal + '件 / リード' + leadTotal + '件 / 返信率' + fmtPct(rate) + '</span></div>';
  }).join('');
  document.getElementById('media-modal-body').innerHTML = '<div style="font-size:12px;color:#6B7A99;margin-bottom:10px">直近5ヶ月の推移</div>' + rows;
  document.getElementById('media-modal').classList.add('open');
}
function closeMediaModal() { document.getElementById('media-modal').classList.remove('open'); }

// ============ カスタム指標 ============
function renderCustomMetrics(pipelineItems, candidateItems) {
  if (!CUSTOM_METRICS.length) return '<div style="color:#9aa3b8;font-size:12px">まだカスタム指標がありません</div>';
  let html = '<div class="custom-list">';
  CUSTOM_METRICS.forEach(function(cm) {
    const num = computeBaseMetric(cm.numerator_key, pipelineItems, candidateItems, currentMonth);
    const den = computeBaseMetric(cm.denominator_key, pipelineItems, candidateItems, currentMonth);
    const val = den ? (num/den*cm.multiplier) : null;
    const creatorName = cm.members ? (cm.members.display_name || cm.members.name) : '';
    html += '<div class="custom-row">' +
      '<span class="name">' + cm.name + '<div class="creator">作成: ' + creatorName + '</div></span>' +
      '<span class="value">' + (val!=null ? Math.round(val*100)/100 : '-') + '</span>' +
      '<button class="del-btn" onclick="deleteCustomMetric(\'' + cm.id + '\')">削除</button>' +
      '</div>';
  });
  html += '</div>';
  return html;
}

function openCustomModal() {
  const opts = BASE_METRIC_OPTIONS.map(o => '<option value="' + o.key + '">' + o.label + '</option>').join('');
  document.getElementById('cm-numerator').innerHTML = opts;
  document.getElementById('cm-denominator').innerHTML = opts;
  document.getElementById('cm-name').value = '';
  document.getElementById('cm-multiplier').value = 100;
  document.getElementById('custom-modal').classList.add('open');
}
function closeCustomModal() { document.getElementById('custom-modal').classList.remove('open'); }

async function saveCustomMetric() {
  const name = document.getElementById('cm-name').value.trim();
  if (!name) { alert('指標名を入力してください'); return; }
  const me = MEMBERS.find(m => m.email === CURRENT_USER_EMAIL);
  const payload = {
    created_by: me ? me.id : null,
    name: name,
    numerator_key: document.getElementById('cm-numerator').value,
    denominator_key: document.getElementById('cm-denominator').value,
    multiplier: parseFloat(document.getElementById('cm-multiplier').value) || 1,
  };
  const { error } = await sb.from('custom_metrics').insert(payload);
  if (error) { alert('保存に失敗しました: ' + error.message); return; }
  const { data } = await sb.from('custom_metrics').select('*,members(name,display_name)');
  CUSTOM_METRICS = data || [];
  closeCustomModal();
  render();
}

async function deleteCustomMetric(id) {
  if (!confirm('この指標を削除しますか？')) return;
  const { error } = await sb.from('custom_metrics').delete().eq('id', id);
  if (error) { alert('削除に失敗しました: ' + error.message); return; }
  CUSTOM_METRICS = CUSTOM_METRICS.filter(c => c.id !== id);
  render();
}
</script>
