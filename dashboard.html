<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Zen Kaku Gothic New',-apple-system,BlinkMacSystemFont,sans-serif;background:#FFFFFF;color:#14213D;min-height:100vh}
#lock-screen{position:fixed;inset:0;background:#14213D;display:flex;align-items:center;justify-content:center;z-index:9999}
#lock-box{background:#FFFFFF;border-radius:4px;padding:36px 40px;width:320px;text-align:center}
#lock-box h2{font-size:16px;font-weight:500;margin-bottom:6px}
#lock-box p{font-size:13px;color:#6B7A99;margin-bottom:20px}
#lock-box input{width:100%;height:40px;padding:0 14px;border:1px solid #DEE7F7;border-radius:4px;font-size:15px;margin-bottom:10px;background:#fff}
#lock-box input:focus{outline:none;border-color:#0D40D9}
#lock-box button{width:100%;height:40px;background:#14213D;color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer}
#lock-error{color:#0D40D9;font-size:12px;margin-top:8px;min-height:18px}
#app{display:none}
.main{max-width:1100px;margin:0 auto;padding:16px}
.member-tabs{display:flex;gap:4px;margin-bottom:16px;flex-wrap:wrap}
.member-tab{padding:6px 18px;border-radius:8px;font-size:13px;cursor:pointer;border:1px solid #DEE7F7;color:#6B7A99;background:#fff}
.member-tab.active{background:#14213D;color:#fff;border-color:#14213D}
.section-title{font-size:13px;font-weight:500;color:#6B7A99;margin-bottom:10px;margin-top:20px;text-transform:uppercase;letter-spacing:0.05em}
/* KPIカード */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:8px}
.kpi-card{background:#fff;border:1px solid #DEE7F7;border-radius:10px;padding:14px 16px}
.kpi-label{font-size:11px;color:#6B7A99;margin-bottom:6px}
.kpi-main{display:flex;align-items:baseline;gap:6px}
.kpi-value{font-size:24px;font-weight:600;color:#14213D}
.kpi-unit{font-size:12px;color:#6B7A99}
.kpi-target{font-size:11px;color:#6B7A99;margin-top:4px}
.kpi-bar-wrap{height:4px;background:#eee;border-radius:2px;margin-top:6px;overflow:hidden}
.kpi-bar{height:4px;border-radius:2px;transition:width 0.5s}
.kpi-bar.good{background:#2d6a4f}
.kpi-bar.warn{background:#e07000}
.kpi-bar.over{background:#1a7f4e}
.kpi-rate{font-size:11px;margin-top:3px}
.kpi-rate.good{color:#2d6a4f}
.kpi-rate.warn{color:#e07000}
.kpi-rate.over{color:#1a7f4e}
/* 新ダッシュボード上部 */
.sec-header{display:flex;align-items:center;gap:8px;margin:0 0 10px 2px}
.sec-header .bar{width:4px;height:16px;border-radius:2px}
.sec-header .title{font-size:16px;font-weight:500;color:#14213D}
.sec-header .sub{font-size:11px;color:#9aa3b8}
.progress-card{background:#fff;border:1px solid #DEE7F7;border-radius:12px;padding:1rem 1.25rem}
.progress-row{margin-bottom:12px}
.progress-row:last-child{margin-bottom:0}
.progress-row-top{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.progress-row-top .label{color:#6B7A99}
.progress-row-top .val{font-weight:500;color:#14213D}
.progress-row-top .val .sub{color:#9aa3b8;font-weight:400}
.progress-bar-wrap{height:6px;background:#eef1f8;border-radius:3px;overflow:hidden}
.progress-bar{height:100%;border-radius:3px}
.hero-card{background:#fff;border:1px solid #DEE7F7;border-radius:16px;padding:1.5rem}
.hero-label{font-size:12px;color:#6B7A99;margin-bottom:6px}
.hero-main{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
.hero-value{font-family:'Shippori Mincho',serif;font-size:40px;font-weight:700;color:#14213D}
.hero-sub{font-size:13px;color:#6B7A99}
.hero-bar-wrap{height:7px;background:#eef1f8;border-radius:4px;overflow:hidden;margin-bottom:14px}
.hero-bar{height:100%;border-radius:4px;background:#0D40D9}
.forecast-label{font-size:12px;color:#6B7A99;margin-bottom:6px}
.forecast-main{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.forecast-value{font-size:20px;font-weight:500;color:#14213D}
.forecast-bar-wrap{height:5px;background:#eef1f8;border-radius:3px;overflow:hidden;margin-bottom:18px}
.forecast-bar{height:100%;border-radius:3px;background:#85B7EB}
.motivation-box{background:#F5F7FC;border-radius:10px;padding:10px 14px;font-size:13px;color:#6B7A99;margin-bottom:16px}
.month-breakdown{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.month-breakdown-item .m-label{font-size:11px;color:#6B7A99;margin-bottom:4px}
.month-breakdown-item .m-label .now{color:#0D40D9;margin-left:4px}
.month-breakdown-item .m-value{font-size:14px;font-weight:500;margin-bottom:6px}
.month-breakdown-item .m-bar-wrap{height:4px;background:#eef1f8;border-radius:3px;overflow:hidden}
.month-breakdown-item .m-bar{height:100%;border-radius:3px}
.ranking-card{background:#fff;border:1px solid #DEE7F7;border-radius:12px;padding:0.25rem 1.25rem}
.ranking-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.ranking-row:last-child{border-bottom:none}
.ranking-rank{width:20px;font-size:15px;font-weight:500;color:#14213D}
.ranking-rank.first{color:#c98500}
.ranking-photo{width:32px;height:32px;border-radius:50%;overflow:hidden;flex-shrink:0}
.ranking-photo img{width:100%;height:100%;object-fit:cover}
.ranking-name{flex:1;font-size:14px;color:#14213D}
.ranking-name.first{font-weight:500}

/* ファネル */
.funnel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:8px}
.funnel-card{background:#fff;border:1px solid #DEE7F7;border-radius:10px;padding:12px;text-align:center}
.funnel-num{font-size:22px;font-weight:600;color:#14213D}
.funnel-target{font-size:11px;color:#6B7A99;margin-top:2px}
.funnel-label{font-size:11px;color:#6B7A99;margin-top:4px}
.funnel-bar-wrap{height:3px;background:#eee;border-radius:2px;margin-top:6px;overflow:hidden}
.funnel-bar{height:3px;border-radius:2px;background:#4a7c59}
/* 全員比較テーブル */
.compare-table{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #DEE7F7;font-size:13px}
.compare-table th{background:#f9f9f7;font-size:11px;font-weight:500;color:#6B7A99;padding:8px 14px;text-align:center;border-bottom:1px solid #DEE7F7}

.compare-table td{padding:10px 14px;border-bottom:1px solid #FFFFFF;text-align:center}

.compare-table tr:last-child td{border-bottom:none}
.progress-cell{display:flex;flex-direction:column;gap:3px;align-items:center}
.mini-bar-wrap{width:80px;height:4px;background:#eee;border-radius:2px;overflow:hidden}
.mini-bar{height:4px;border-radius:2px}
.mini-bar.good{background:#2d6a4f}
.mini-bar.warn{background:#e07000}
.mini-bar.over{background:#1a7f4e}
/* 目標編集 */

.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0}

<script>
const SUPABASE_URL = 'https://vqunibhzmvlckqbydgea.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxdW5pYmh6bXZsY2txYnlkZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMzY0NTYsImV4cCI6MjA5NzgxMjQ1Nn0.t9_RIVPY1vrgGmxxFFYXP9uWxT7401ha4Flc9q0_zMA';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let MEMBERS = [];
let PIPELINE_DATA = [];
let PHASE_HISTORY = [];
let CANDIDATE_DATA = [];
let TARGETS = [];
let REVENUE_BY_MEMBER = {};
let MEDIA_FEE_RATES = [];
let currentMember = '全員';
let currentMonth = '';
let editingTargetMemberId = null;
let editingTargetMonth = null;

const MEMBER_MAP = {'相川':'aikawa_kenta','永井':'nagai_yudai','會澤':'aizawa_yuma'};
const MEMBER_NAMES = {'aikawa_kenta':'相川','nagai_yudai':'永井','aizawa_yuma':'會澤'};

const INTERVIEW_PHASES = ['初回面談DONE','求人提案なう','推薦するやでぃ','選考なう','内定KITAAA','内定承諾歓喜','入社後フォローしようね'];
const SELECTION_PHASES = ['カジュアル面談','一次面接','二次〜面接','最終面接','内定KITAAA'];
const OFFER_PHASES = ['内定KITAAA','内定承諾歓喜','入社後フォローしようね'];
const ACCEPT_PHASES = ['内定承諾歓喜','入社後フォローしようね'];
const INTERVIEW_SCHEDULED_PHASES = ['一次面接','二次〜面接','最終面接','内定KITAAA'];

async function doLogin() {
  const email = document.getElementById('email-input').value;
  const password = document.getElementById('pw-input').value;
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) { document.getElementById('lock-error').textContent = 'メールアドレスまたはパスワードが違います'; return; }
  showApp();
}
async function doLogout() { await sb.auth.signOut(); location.reload(); }
function showApp() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadData();
}
sb.auth.getSession().then(({ data: { session } }) => { if (session) showApp(); });

function getMonths() {
  const months = [];
  const now = new Date();
  for (let i = -1; i <= 3; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
    const label = (d.getMonth()+1) + '月';
    months.push({ key, label });
  }
  return months;
}

async function loadData() {
  const months = getMonths();
  currentMonth = months[1].key; // 今月

  // 月タブ生成
  const tabsEl = document.getElementById('month-tabs');
  tabsEl.innerHTML = months.map(m =>
    '<button class="month-tab' + (m.key === currentMonth ? ' active' : '') + '" onclick="setMonth(\'' + m.key + '\',this)">' + m.label + '</button>'
  ).join('');

  // pipelineは1912件あるため全件取得（range指定）
  async function fetchAllPipeline() {
    let all = [];
    let from = 0;
    const size = 1000;
    while (true) {
      const { data, error } = await sb.from('pipeline').select('*,members(name,display_name)').range(from, from + size - 1);
      if (error || !data || data.length === 0) break;
      all = all.concat(data);
      if (data.length < size) break;
      from += size;
    }
    return all;
  }

  async function fetchAllPhaseHistory() {
    let all = [];
    let from = 0;
    const size = 1000;
    while (true) {
      const { data, error } = await sb.from('pipeline_phase_history').select('*').range(from, from + size - 1);
      if (error || !data || data.length === 0) break;
      all = all.concat(data);
      if (data.length < size) break;
      from += size;
    }
    return all;
  }

  const [{ data: members }, { data: candidates }, { data: targets }, { data: revenueView }, { data: feeRates }, pipeline, phaseHistory] = await Promise.all([
    sb.from('members').select('*'),
    sb.from('candidates').select('*,members(name,display_name)'),
    sb.from('targets').select('*,members(name,display_name)'),
    sb.from('revenue_forecast_by_member').select('*'),
    sb.from('media_fee_rates').select('*'),
    fetchAllPipeline(),
    fetchAllPhaseHistory()
  ]);

  MEMBERS = members || [];
  PIPELINE_DATA = pipeline || [];
  PHASE_HISTORY = phaseHistory || [];
  CANDIDATE_DATA = candidates || [];
  TARGETS = targets || [];
  MEDIA_FEE_RATES = feeRates || [];
  REVENUE_BY_MEMBER = {};
  (revenueView || []).forEach(function(r) {
    REVENUE_BY_MEMBER[r.member_id] = Math.round(r.revenue_forecast_sum || 0);
  });

  document.getElementById('header-badge').textContent = currentMonth;
  render();
}

function setMonth(m, el) {
  currentMonth = m;
  document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('header-badge').textContent = m;
  render();
}

function setMember(m, el) {
  currentMember = m;
  document.querySelectorAll('.member-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function getMonthRange(ym) {
  const [y, mo] = ym.split('-').map(Number);
  const start = ym + '-01';
  const end = new Date(y, mo, 1).toISOString().substring(0,10);
  return { start, end };
}

// 8月始まり・4ヶ月区切りの期を計算する
function getTermInfo(ym) {
  const [y, mo] = ym.split('-').map(Number);
  const fyStartYear = mo >= 8 ? y : y - 1;
  const monthIndexInFY = (mo - 8 + 12) % 12;
  const termIndex = Math.floor(monthIndexInFY / 4);
  const termNames = ['第1期','第2期','第3期'];
  const termStartOffset = termIndex * 4;
  const months = [];
  for (let i = 0; i < 4; i++) {
    const d = new Date(fyStartYear, 7 + termStartOffset + i, 1);
    months.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }
  const yearMonths = [];
  for (let i = 0; i < 12; i++) {
    const d = new Date(fyStartYear, 7 + i, 1);
    yearMonths.push(d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0'));
  }
  return {
    termLabel: termNames[termIndex],
    termRangeLabel: months[0] + '〜' + months[3],
    months: months,
    yearLabel: fyStartYear + '/8〜' + (fyStartYear+1) + '/7',
    yearMonths: yearMonths
  };
}

// そのpipelineが対象フェーズ群に「初めて」到達した日付を、pipeline_idごとに求める
function firstOccurrenceMap(pipelineItems, phases) {
  const pipelineIds = new Set(pipelineItems.map(p => p.id));
  const firstByPipeline = {};
  PHASE_HISTORY.filter(h => pipelineIds.has(h.pipeline_id) && phases.includes(h.phase)).forEach(h => {
    if (!firstByPipeline[h.pipeline_id] || h.changed_at < firstByPipeline[h.pipeline_id]) {
      firstByPipeline[h.pipeline_id] = h.changed_at;
    }
  });
  return firstByPipeline;
}

// 実績ベースの売上：指定した月群のいずれかで初めて内定承諾歓喜以上に到達した候補者のrevenue_forecast合計（候補者単位で重複排除）
function sumActualRevenueForMonths(pipelineItems, candidateItems, monthList) {
  const firstByPipeline = firstOccurrenceMap(pipelineItems, ACCEPT_PHASES);
  const countedCandidates = new Set();
  let sum = 0;
  Object.keys(firstByPipeline).forEach(function(pid) {
    const ym = firstByPipeline[pid].substring(0,7);
    if (monthList.indexOf(ym) === -1) return;
    const p = pipelineItems.find(function(x) { return x.id === pid; });
    if (!p || !p.candidate_id || countedCandidates.has(p.candidate_id)) return;
    countedCandidates.add(p.candidate_id);
    const c = candidateItems.find(function(x) { return x.id === p.candidate_id; }) || CANDIDATE_DATA.find(function(x) { return x.id === p.candidate_id; });
    if (c && c.revenue_forecast) sum += c.revenue_forecast;
  });
  return sum;
}

// 承諾数：指定した月群のいずれかで初めて内定承諾歓喜以上に到達したpipeline件数
function countAcceptsForMonths(pipelineItems, monthList) {
  const firstByPipeline = firstOccurrenceMap(pipelineItems, ACCEPT_PHASES);
  return Object.values(firstByPipeline).filter(function(d) {
    return monthList.indexOf(d.substring(0,7)) !== -1;
  }).length;
}

// 粗利：指定した月群のいずれかでgross_profit_calculated_atを迎えた候補者のgross_profit合計
function sumGrossProfitForMonths(candidateItems, monthList) {
  return candidateItems.reduce(function(sum, c) {
    if (c.gross_profit == null || !c.gross_profit_calculated_at) return sum;
    const ym = c.gross_profit_calculated_at.substring(0,7);
    return monthList.indexOf(ym) !== -1 ? sum + c.gross_profit : sum;
  }, 0);
}

// 見込みベース売上：実績ベース ＋ 進行中×決定ヨミ10%以上の候補者のrevenue_yomi合計
function sumForecastRevenue(candidateItems, actualSum) {
  const inProgressSum = candidateItems.reduce(function(sum, c) {
    if (c.status !== '進行中' || c.revenue_yomi == null) return sum;
    const pct = c.decision_yomi ? parseFloat(String(c.decision_yomi).replace('%','')) : 0;
    return pct >= 10 ? sum + c.revenue_yomi : sum;
  }, 0);
  return actualSum + inProgressSum;
}

function sumTargetsForMonths(memberId, monthList, field) {
  return monthList.reduce(function(sum, m) {
    const t = getTarget(memberId, m);
    return sum + (t && t[field] ? t[field] : 0);
  }, 0);
}

function cleanSourceForFee(s) {
  return (s || '').replace(/^[（(]+/, '').trim();
}
function getCurrentFeeRateForDashboard(source) {
  const cleaned = cleanSourceForFee(source);
  const todayStr = new Date().toISOString().substring(0,10);
  const candidates = MEDIA_FEE_RATES.filter(function(r) { return r.source === cleaned && r.effective_from <= todayStr; });
  if (!candidates.length) return 0;
  candidates.sort(function(a,b) { return b.effective_from.localeCompare(a.effective_from); });
  return candidates[0].fee_rate;
}

function filterByMemberName(items, memberName) {
  if (!memberName || memberName === '全員') return items;
  const key = MEMBER_MAP[memberName];
  return items.filter(i => i.members && i.members.name === key);
}

function calcActuals(pipelineItems, candidateItems, month) {
  const { start, end } = getMonthRange(month);
  const monthCandidates = candidateItems.filter(c => {
    const d = (c.registered_at || '').substring(0,10);
    return d >= start && d < end;
  });

  // 売上見込み：ビューから取得（カジュアル面談以降・決定ヨミ加味）
  // candidateItemsに含まれるmember_idに対応する売上見込みを合算
  // ただし重複を避けるためSet使用
  const memberIds = [...new Set(candidateItems.map(function(c) { return c.member_id; }).filter(Boolean))];
  const revenueSum = memberIds.reduce(function(s, mid) { return s + (REVENUE_BY_MEMBER[mid] || 0); }, 0);

  // 粗利：当月中に確定（内定承諾歓喜への到達 or 再計算）した候補者のgross_profit合計
  const grossProfitSum = candidateItems.reduce(function(sum, c) {
    if (c.gross_profit == null || !c.gross_profit_calculated_at) return sum;
    const d = c.gross_profit_calculated_at.substring(0,10);
    return (d >= start && d < end) ? sum + c.gross_profit : sum;
  }, 0);

  // 面談数：当月登録候補者数
  const interviews = monthCandidates.length;

  // 推薦数：当月作成のpipelineのうち書類選考以上
  // 推薦数はpipelineから自動集計せず、targetsテーブルの手入力実績(recommend_actual)を使う

  // 選考数・内定数・承諾数：当月中に該当フェーズへの変更があった件数（pipeline_phase_historyベース）
  const pipelineIds = new Set(pipelineItems.map(p => p.id));
  const monthHistory = PHASE_HISTORY.filter(h => {
    const d = (h.changed_at || '').substring(0,10);
    return pipelineIds.has(h.pipeline_id) && d >= start && d < end;
  });
  function countDistinctByPhases(phases) {
    return new Set(monthHistory.filter(h => phases.includes(h.phase)).map(h => h.pipeline_id)).size;
  }
  // 内定・承諾は複数フェーズにまたがる一度きりの出来事のため、
  // 「そのpipelineが対象フェーズ群に初めて到達した月」でのみカウントする（月またぎの二重計上を防止）
  function countFirstOccurrenceByPhases(phases) {
    const firstByPipeline = {};
    PHASE_HISTORY.filter(h => pipelineIds.has(h.pipeline_id) && phases.includes(h.phase)).forEach(h => {
      if (!firstByPipeline[h.pipeline_id] || h.changed_at < firstByPipeline[h.pipeline_id]) {
        firstByPipeline[h.pipeline_id] = h.changed_at;
      }
    });
    return Object.values(firstByPipeline).filter(d => {
      const day = (d || '').substring(0,10);
      return day >= start && day < end;
    }).length;
  }
  const selections = countDistinctByPhases(SELECTION_PHASES);
  const offers = countFirstOccurrenceByPhases(OFFER_PHASES);
  const accepts = countFirstOccurrenceByPhases(ACCEPT_PHASES);

  // 進行中フェーズ別
  const activeByPhase = {};
  pipelineItems.filter(p => p.status === '進行中').forEach(p => {
    const ph = p.phase || '未設定';
    activeByPhase[ph] = (activeByPhase[ph] || 0) + 1;
  });

  return { revenueSum, grossProfitSum, interviews, selections, offers, accepts, activeByPhase };
}

function getTarget(memberId, month) {
  return TARGETS.find(t => t.member_id === memberId && t.year_month === month) || null;
}

function barClass(rate) {
  if (rate >= 1) return 'over';
  if (rate >= 0.7) return 'good';
  return 'warn';
}

function fmtRate(rate) {
  return Math.round(rate * 100) + '%';
}

function fmtSalary(v) {
  if (!v) return '-';
  if (v >= 10000000) return (v/10000000).toFixed(1) + '億';
  return (v/10000).toFixed(0) + '万';
}

function renderKpiCard(label, actual, target, unit, isRevenue) {
  const rate = target ? actual / target : null;
  const pct = rate !== null ? Math.min(rate * 100, 100) : 0;
  const cls = rate !== null ? barClass(rate) : 'good';
  const actualStr = isRevenue ? fmtSalary(actual) : actual;
  const targetStr = isRevenue ? fmtSalary(target) : (target ? target : '-');
  return '<div class="kpi-card">' +
    '<div class="kpi-label">' + label + '</div>' +
    '<div class="kpi-main"><span class="kpi-value">' + actualStr + '</span><span class="kpi-unit">' + unit + '</span></div>' +
    (target ? '<div class="kpi-target">目標: ' + targetStr + unit + '</div>' : '<div class="kpi-target">目標未設定</div>') +
    (target ? '<div class="kpi-bar-wrap"><div class="kpi-bar ' + cls + '" style="width:' + pct + '%"></div></div>' : '') +
    (target ? '<div class="kpi-rate ' + cls + '">' + fmtRate(rate) + '</div>' : '') +
    '</div>';
}

        '<td><strong>' + member.display_name + '</strong></td>' +
        cell(actuals.revenueSum, target ? target.revenue_target : null, true) +
        cell(actuals.grossProfitSum, target ? target.gross_profit_target : null, true) +
        cell(actuals.interviews, target ? target.interview_target : null, false) +
        cell((target && target.recommend_actual) || 0, target ? target.recommend_target : null, false) +
        cell(actuals.selections, target ? target.selection_target : null, false) +
        cell(actuals.offers, target ? target.offer_target : null, false) +
        cell(actuals.accepts, target ? target.accept_target : null, false) +
        '</tr>';
    });

    html += '</tbody></table>';

    // 全員の進行中フェーズ別
    html += '<div class="section-title">全員 進行中フェーズ別件数</div>';
    const allActive = PIPELINE_DATA.filter(p => p.status === '進行中');
    const allPhase = {};
    allActive.forEach(p => { const ph = p.phase||'未設定'; allPhase[ph]=(allPhase[ph]||0)+1; });
    const PHASE_ORDER2 = ['未提案','提案中','応募承諾','書類選考','カジュアル面談','一次面接','二次〜面接','最終面接','内定KITAAA','内定承諾歓喜','入社後フォローしようね'];
    html += '<div class="funnel-grid">';
    PHASE_ORDER2.forEach(ph => {
      const cnt = allPhase[ph] || 0;
      if (cnt === 0) return;
      html += '<div class="funnel-card"><div class="funnel-num">' + cnt + '</div><div class="funnel-label">' + ph + '</div></div>';
    });
    html += '</div>';

    el.innerHTML = html;
  }
}

// 目標編集モーダル
function openTargetModal(memberId, month) {
  editingTargetMemberId = memberId;
  editingTargetMonth = month;
  const target = TARGETS.find(t => t.member_id === memberId && t.year_month === month) || null;
  const memberName = MEMBERS.find(m => m.id === memberId)?.display_name || '';
  document.getElementById('target-modal-title').textContent = memberName + ' ' + month + ' の目標';
  document.getElementById('tf-revenue').value = target ? target.revenue_target || '' : '';
  document.getElementById('tf-gross-profit').value = target ? target.gross_profit_target || '' : '';
  document.getElementById('tf-interview').value = target ? target.interview_target || '' : '';
  document.getElementById('tf-recommend').value = target ? target.recommend_target || '' : '';
  document.getElementById('tf-recommend-actual').value = target ? target.recommend_actual || '' : '';
  document.getElementById('tf-selection').value = target ? target.selection_target || '' : '';
  document.getElementById('tf-offer').value = target ? target.offer_target || '' : '';
  document.getElementById('tf-accept').value = target ? target.accept_target || '' : '';
  document.getElementById('target-save-msg').textContent = '';
  document.getElementById('target-modal').classList.add('open');
}

async function saveTarget() {
  const payload = {
    member_id: editingTargetMemberId,
    year_month: editingTargetMonth,
    revenue_target: document.getElementById('tf-revenue').value ? parseInt(document.getElementById('tf-revenue').value) : null,
    gross_profit_target: document.getElementById('tf-gross-profit').value ? parseInt(document.getElementById('tf-gross-profit').value) : null,
    interview_target: document.getElementById('tf-interview').value ? parseInt(document.getElementById('tf-interview').value) : null,
    recommend_target: document.getElementById('tf-recommend').value ? parseInt(document.getElementById('tf-recommend').value) : null,
    recommend_actual: document.getElementById('tf-recommend-actual').value ? parseInt(document.getElementById('tf-recommend-actual').value) : null,
    selection_target: document.getElementById('tf-selection').value ? parseInt(document.getElementById('tf-selection').value) : null,
    offer_target: document.getElementById('tf-offer').value ? parseInt(document.getElementById('tf-offer').value) : null,
    accept_target: document.getElementById('tf-accept').value ? parseFloat(document.getElementById('tf-accept').value) : null,
    updated_at: new Date().toISOString(),
  };

  const { error } = await sb.from('targets').upsert(payload, { onConflict: 'member_id,year_month' });
  if (error) { alert('保存に失敗しました: ' + error.message); return; }

  document.getElementById('target-save-msg').textContent = '✅ 保存しました';
  const { data: targets } = await sb.from('targets').select('*,members(name,display_name)');
  TARGETS = targets || [];
  setTimeout(function() { closeTargetModal(); render(); }, 600);
}

function closeTargetModal() {
  document.getElementById('target-modal').classList.remove('open');
}
document.getElementById('target-modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('target-modal')) closeTargetModal();
});
</script>
